# Kong Declarative Configuration for Self-Hosted Supabase
# Do not edit this file manually - it is generated by supabase-up.sh
# This configuration requires:
#   - kong:3.4-alpine
#   - supabase/gotrue
#   - supabase/postgrest
#   - supabase/realtime
#   - supabase/storage-api
# ============================================

_format_version: "3.0"
_transform: true

# ============================================
# Services
# ============================================

# GoTrue Auth Service
services:
  - name: gotrue
    url: http://gotrue:9999
    routes:
      - name: gotrue-route
        path: /auth/v1/
        strip_path: true
        plugins:
          - name: cors
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Total-Count
            - X-Page-Total
            - X-Limit
          credentials: true
          max_age: 3600

  # PostgREST Service
  - name: postgrest
    url: http://postgrest:3000
    routes:
      - name: postgrest-route
        path: /rest/v1/
        strip_path: true
        plugins:
          - name: cors
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Total-Count
            - X-Page-Total
            - X-Limit
          credentials: true
          max_age: 3600

  # Realtime Service
  - name: realtime
    url: http://realtime:4000/socket
    routes:
      - name: realtime-route
        path: /realtime/v1/
        strip_path: true
        plugins:
          - name: cors
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
            - PROPFIND
          headers:
            - Accept
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Total-Count
          credentials: true
          max_age: 3600

  # Storage Service
  - name: storage
    url: http://storage:5000
    routes:
      - name: storage-route
        path: /storage/v1/
        strip_path: true
        plugins:
          - name: cors
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Upsert
          exposed_headers:
            - X-Total-Count
            - X-Page-Total
            - X-Limit
          credentials: true
          max_age: 3600

  # Meta Service (Database Management)
  - name: meta
    url: http://meta:8080
    routes:
      - name: meta-route
        path: /meta/v1/
        strip_path: true
        plugins:
          - name: cors

# ============================================
# Plugins
# ============================================

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - X-Total-Count
        - X-Page-Total
        - X-Limit
      credentials: true
      max_age: 3600