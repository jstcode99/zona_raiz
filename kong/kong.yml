_format_version: "3.0"

services:
  # PostgREST - Database API
  - name: postgrest
    url: http://postgrest:3000/
    routes:
      - name: postgrest-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: true
          max_age: 3600

  # GoTrue - Authentication
  - name: gotrue
    url: http://gotrue:9999/
    routes:
      - name: gotrue-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: true

  # Storage API
  - name: storage
    url: http://storage:5000/
    routes:
      - name: storage-route
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - x-upsert
          credentials: true

  # Next.js App
  - name: nextjs
    url: http://nextjs:3000/
    routes:
      - name: nextjs-route
        strip_path: false
        paths:
          - /
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: true

consumers:
  - username: anon
    keyauth_credentials:
      - key: dummy
  - username: service_role
    keyauth_credentials:
      - key: dummy

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - X-Total-Count
        - X-Total-Pages
        - X-Page
        - X-Page-Size
        - X-Range
      credentials: true
      max_age: 3600