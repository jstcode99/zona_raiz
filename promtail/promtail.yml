server:
  http_listen_address: :9080
  grpc_listen_address: :9081

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 10s

scrape_configs:
  # Next.js logs
  - job_name: nextjs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nextjs
          service: zona_raiz
          environment: production
          __path__: /var/log/nextjs/*.log

  # Docker containers logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          environment: production
          __path__: /var/lib/docker/containers/*/*-json.log