# ============================================
# zona_raiz - Self-Hosted Supabase Stack
# Production-ready Docker Compose
# ============================================
# This stack is independent from the Next.js app.
# Start with: docker-compose -f docker-compose.supabase.yml up -d
#
# Services:
#   - postgres: PostgreSQL 17 with PostGIS
#   - kong: API Gateway (REST + Auth)
#   - gotrue: Authentication service
#   - postgrest: REST API for PostgreSQL
#   - realtime: Real-time subscriptions
#   - storage: S3-compatible storage (MinIO)
#   - meta: Management API
#   - vector: Vector embeddings (optional)
#   - analytics: Event analytics (optional)
#   - pgadmin: Database management (optional)
# ============================================

name: supabase-stack

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: supabase/postgres:17.1.0.147
    container_name: supabase_postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_INITIAL_DATABASE=${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - supabase_pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:mapped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - supabase_network
    restart: unless-stopped
    shm_size: 256mb

  # ============================================
  # Kong API Gateway
  # ============================================
  kong:
    image: kong:3.4-alpine
    container_name: supabase_kong
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/var/lib/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_LOG_LEVEL=info
      - KONG_PLUGINS=bundled,jwt,cors,key-auth,acl
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
      - "${KONG_HTTPS_PORT:-8443}:8443"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./kong/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_healthy
      postgrest:
        condition: service_healthy
      realtime:
        condition: service_healthy
      storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supabase_network
    restart: unless-stopped

  # ============================================
  # GoTrue Authentication Service
  # ============================================
  gotrue:
    image: supabase/gotrue:v2.158.1
    container_name: supabase_gotrue
    environment:
      - GOTRUE_API_HOST=0.0.0.0
      - GOTRUE_API_PORT=9999
      - GOTRUE_API_EXTERNAL_URL=${GOTRUE_API_EXTERNAL_URL}
      - GOTRUE_API_JWT_SECRET=${GOTRUE_JWT_SECRET}
      - GOTRUE_API_JWT_EXP=${GOTRUE_JWT_EXP:-3600}
      - GOTRUE_API_JWT_DEFAULT_GROUP_NAME=authenticated
      - GOTRUE_API_MAILER_AUTOCONFIRM=true
      - GOTRUE_SITE_URL=${SITE_URL}
      - GOTRUE_URI_ALLOW_LISTS=*
      - GOTRUE_API_DATABASE_DRIVER=postgres
      - GOTRUE_API_DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}?search_path=auth
      - GOTRUE_API_EXTERNAL_GOOGLE_ENABLED=true
      - GOTRUE_API_EXTERNAL_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - GOTRUE_API_EXTERNAL_GOOGLE_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOTRUE_API_EXTERNAL_GOOGLE_REDIRECT_URI=${GOTRUE_API_EXTERNAL_URL}/auth/v1/callback
      - GOTRUE_API_RATE_LIMIT_EMAIL_SENT=30
      - GOTRUE_API_RATE_LIMIT_TOKEN_REFRESH=150
      - GOTRUE_API_RATE_LIMIT_SIGN_IN_SIGN_UP=30
      - GOTRUE_API_RATE_LIMIT_VERIFICATIONS=30
      - GOTRUE_API_ENABLE_SIGNUP=true
      - GOTRUE_API_SECURE_TOKEN_CHANGE=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - supabase_network
    restart: unless-stopped

  # ============================================
  # PostgREST - REST API for PostgreSQL
  # ============================================
  postgrest:
    image: supabase/postgrest:12.0.2
    container_name: supabase_postgrest
    environment:
      - PGRST_DB_URI=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
      - PGRST_DB_SCHEMAS=public,graphql_public,television
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_DB_USE_LEGACY_GUCS=false
      - PGRST_APP_SETTINGS_JWT_SECRET=${GOTRUE_JWT_SECRET}
      - PGRST_APP_SETTINGS_JWT_EXP=3600
      - PGRST_DB_MAX_ROWS=1000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supabase_network
    restart: unless-stopped

  # ============================================
  # Realtime - Real-time Subscriptions
  # ============================================
  realtime:
    image: supabase/realtime:v2.30.23
    container_name: supabase_realtime
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-postgres}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SSL=false
      - PORT=4000
      - REALTIME_JWT_SECRET=${GOTRUE_JWT_SECRET}
      - REALTIME_IP_VERSION=ipv4
      - REALTIME_MAX_HEADER_LENGTH=4096
      - REALTIME_POOLER_PORT=6544
      - REALTIME_POOLER_DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
      - REALTIME__USE_LEGACY_GUCS=false
      - _REALTIME_AUTHENTICATED_USERS=true
      - _REALTIME_RLS_POLICY_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "printf \\0 > /dev/tcp/localhost/4000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supabase_network
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # ============================================
  # Storage - S3-Compatible Object Storage
  # ============================================
  storage:
    image: supabase/storage-api:v1.11.7
    container_name: supabase_storage
    environment:
      - ANON_KEY=${SUPABASE_ANON_KEY}
      - SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - POSTGREST_ROLES=anon,authenticated
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
      - FILE_SIZE_LIMIT=52428800
      - STORAGE_BACKEND=file
      - FILE_STORAGE_BACKEND_PATH=/var/lib/storage
      - TENANT_ID=stub
      - REGION=stub
      - GLOBAL_S3_BUCKET=stub
      - ENABLE_EXTERNAL_STORAGE=false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - supabase_storage:/var/lib/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supabase_network
    restart: unless-stopped

  # ============================================
  # Meta - Management API
  # ============================================
  meta:
    image: supabase/meta:3.1.1
    container_name: supabase_meta
    environment:
      - PG_META_PORT=8080
      - PG_META_DB_HOST=postgres
      - PG_META_DB_PORT=5432
      - PG_META_DB_NAME=${POSTGRES_DB:-postgres}
      - PG_META_DB_USER=${POSTGRES_USER:-postgres}
      - PG_META_DB_USER_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supabase_network
    restart: unless-stopped

  # ============================================
  # Vector - Vector Embeddings (Optional)
  # ============================================
  vector:
    image: tensorchord/pgvecto-rs:pg17-v0.2.0
    container_name: supabase_vector
    environment:
      - PG_VECTOR_HOST=postgres
      - PG_VECTOR_PORT=5432
      - PG_VECTOR_USER=${POSTGRES_USER:-postgres}
      - PG_VECTOR_PASSWORD=${POSTGRES_PASSWORD}
      - PG_VECTOR_DATABASE=${POSTGRES_DB:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supabase_network
    restart: unless-stopped
    profiles:
      - optional

  # ============================================
  # Analytics - Event Analytics (Optional)
  # ============================================
  analytics:
    image: supabase/analytics:v0.2.2
    container_name: supabase_analytics
    environment:
      - ANALYTICS_DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-postgres}
      - ANALYTICS_PORT=5000
      - ANALYTICS_API_KEYS=${SUPABASE_ANON_KEY},${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supabase_network
    restart: unless-stopped
    profiles:
      - optional

  # ============================================
  # pgAdmin - Database Management (Optional)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: supabase_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@${DOMAIN:-localhost}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - supabase_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supabase_network
    restart: unless-stopped
    profiles:
      - optional

  # ============================================
  # Vault - Secrets Management (Optional)
  # ============================================
  # vault:
  #   image: supabase/vault:1.0.0
  #   container_name: supabase_vault
  #   environment:
  #     - VAULT_PORT=8200
  #     - VAULT_DB_HOST=postgres
  #     - VAULT_DB_PORT=5432
  #     - VAULT_DB_NAME=${POSTGRES_DB:-postgres}
  #     - VAULT_DB_USER=${POSTGRES_USER:-postgres}
  #     - VAULT_DB_PASSWORD=${POSTGRES_PASSWORD}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - supabase_network
  #   restart: unless-stopped

# ============================================
# Networks
# ============================================
networks:
  supabase_network:
    name: supabase_network
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.28.0.0/16}

# ============================================
# Volumes
# ============================================
volumes:
  supabase_pgdata:
    name: supabase_pgdata
  supabase_storage:
    name: supabase_storage
  supabase_pgadmin_data:
    name: supabase_pgadmin_data